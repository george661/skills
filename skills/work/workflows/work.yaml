---
name: Work Command Workflow
config:
  checkpoint_prefix: work
  worktree: true
  labels:
    - automated
    - orchestrator

inputs:
  issue_key:
    type: string
    required: true
  team_mode:
    type: boolean
    required: false
    default: false

nodes:
  # Phase 0.5: Prior Work Assessment
  - id: prior_work_assessment
    name: Prior Work Assessment
    type: command
    command: assess-prior-work
    args:
      - "$issue_key"
    output_format: json

  # Phase 0.7: Bug Test Verification Gate
  # When bug_test_gate fails (non-Bug issue), bug_test_verify is skipped.
  # planning uses trigger_rule: all_done to fire when both reach
  # terminal state (failed + skipped = both done).
  - id: bug_test_gate
    name: Bug Test Verification Gate
    type: gate
    depends_on:
      - prior_work_assessment
    condition: '$prior_work_assessment.issue_type == "Bug"'
    on_failure: skip_downstream

  - id: bug_test_verify
    name: Bug Test Verification
    type: command
    command: verify-bug-tests
    args:
      - "$issue_key"
    depends_on:
      - bug_test_gate
    output_format: json

  # Phase 1: Planning (runs after bug tests OR when not a bug)
  - id: planning
    name: Create Implementation Plan
    type: command
    command: create-implementation-plan
    args:
      - "$issue_key"
    depends_on:
      - bug_test_verify
      - prior_work_assessment
    trigger_rule: all_done
    output_format: json

  # Phase 1.5: Plan Review
  - id: plan_review
    name: Review Implementation Plan
    type: command
    command: review-implementation-plan
    args:
      - "$issue_key"
    depends_on:
      - planning
    output_format: json
    dispatch: inline

  # Phase 2: Implementation
  - id: implementation
    name: Implement Solution
    type: command
    command: implement
    args:
      - "$issue_key"
    depends_on:
      - plan_review
    output_format: json

  # Phase 3: Code Review
  - id: code_review
    name: Code Review
    type: command
    command: review
    args:
      - "$implementation.repo"
      - "$implementation.pr_number"
    depends_on:
      - implementation
    output_format: json
    dispatch: inline

  # Review Verdict Gate
  - id: review_verdict
    name: Review Verdict Gate
    type: gate
    depends_on:
      - code_review
    condition: >-
      $code_review.verdict == "APPROVED" or
      $code_review.verdict == "LGTM"
    on_failure: continue

  # Phase 4: Fix PR (only if review requires rework)
  # rework_gate with on_failure: skip_downstream will skip fix_pr,
  # re_review. ci_gate still runs because it depends on both re_review
  # and review_verdict with trigger_rule: one_success.
  - id: rework_gate
    name: Rework Required Gate
    type: gate
    depends_on:
      - review_verdict
    condition: '$code_review.verdict == "REQUIRES_REWORK"'
    on_failure: skip_downstream

  - id: fix_pr
    name: Fix PR Issues
    type: command
    command: fix-pr
    args:
      - "$issue_key"
      - "$implementation.repo"
      - "$implementation.pr_number"
    depends_on:
      - rework_gate
    output_format: json

  # Phase 4c: Re-review after fixes
  - id: re_review
    name: Re-review After Fixes
    type: command
    command: review
    args:
      - "$implementation.repo"
      - "$implementation.pr_number"
    depends_on:
      - fix_pr
    output_format: json
    dispatch: inline

  # Phase 5: CI Gate Check
  - id: ci_gate
    name: CI Validation Gate
    type: command
    command: wait-for-ci
    args:
      - "$implementation.repo"
      - "$implementation.pr_number"
    depends_on:
      - re_review
      - review_verdict
    trigger_rule: one_success
    output_format: json

  - id: ci_success_gate
    name: CI Success Gate
    type: gate
    depends_on:
      - ci_gate
    condition: '$ci_gate.ci_success == true'
    on_failure: stop

  # Phase 6: Merge
  - id: merge_pr
    name: Merge PR
    type: command
    command: resolve-pr
    args:
      - "$issue_key"
    depends_on:
      - ci_success_gate
    output_format: json
    dispatch: inline

  # Phase 7: Verification and Cleanup
  - id: verify_jira_status
    name: Verify Jira Status
    type: command
    command: verify-jira-transition
    args:
      - "$issue_key"
    depends_on:
      - merge_pr
    output_format: json

  - id: cleanup_worktree
    name: Cleanup Worktree
    type: command
    command: cleanup-worktree
    args:
      - "$implementation.repo"
      - "$issue_key"
    depends_on:
      - verify_jira_status
    output_format: json

outputs:
  final_status:
    node: verify_jira_status
    field: status
  pr_url:
    node: implementation
    field: pr_url
  repo:
    node: implementation
    field: repo
