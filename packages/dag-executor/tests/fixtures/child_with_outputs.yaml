name: child_with_outputs
description: Child workflow that emits concrete outputs
version: 1.0.0

inputs: {}

outputs:
  result:
    description: Result value from the child
    type: string

nodes:
  - id: produce_output
    name: Produce Output
    type: bash
    script: |
      echo '{"result": "success_from_child"}'
    output_format: json
