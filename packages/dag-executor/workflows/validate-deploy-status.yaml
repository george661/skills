---
# GW-5491: this workflow used to be a 3-node bash pipeline that hard-coded
# the deploy-status decision in shell. It's now a single contract-tier
# prompt node that loads commands/validate-deploy-status.md via promptc,
# renders it with the issue input, and lets the LLM produce structured
# output that promptc.parse_output extracts against the 7 declared output
# fields. This exercises the same contract path the dispatch-local.py
# router uses, giving us two independent end-to-end paths through
# promptc.render -> LLM -> promptc.parse_output.
name: Validate Deploy Status Sub-DAG

config:
  checkpoint_prefix: validate-deploy-status
  worktree: false

inputs:
  issue_key:
    type: string
    required: true
    pattern: "^[A-Z]+-\\d+$"

state:
  deploy_status:
    strategy: overwrite
  repo:
    strategy: overwrite
  pipeline:
    strategy: overwrite
  build_id:
    strategy: overwrite
  build_status:
    strategy: overwrite
  env_url:
    strategy: overwrite
  deploy_gap_reason:
    strategy: overwrite

outputs:
  deploy_status:
    node: check_deploy_status
    field: DEPLOY_STATUS
  repo:
    node: check_deploy_status
    field: REPO
  pipeline:
    node: check_deploy_status
    field: PIPELINE
  build_id:
    node: check_deploy_status
    field: BUILD_ID
  build_status:
    node: check_deploy_status
    field: BUILD_STATUS
  env_url:
    node: check_deploy_status
    field: ENV_URL
  deploy_gap_reason:
    node: check_deploy_status
    field: DEPLOY_GAP_REASON

nodes:
  - id: check_deploy_status
    name: Check Deploy Status (contract-tier prompt)
    type: prompt
    model: haiku
    mode: completion
    # Path is relative to the package root (where dag-exec is invoked).
    # Same convention as workflows/promptc-e2e.yaml.
    prompt_file: ../../commands/validate-deploy-status.md
    prompt_inputs:
      issue: ${issue_key}
    writes:
      - deploy_status
      - repo
      - pipeline
      - build_id
      - build_status
      - env_url
      - deploy_gap_reason
