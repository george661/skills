---
name: Validate Run Tests Sub-DAG
config:
  checkpoint_prefix: validate-run-tests
  worktree: false

inputs:
  issue_key:
    type: string
    required: true
    pattern: "^[A-Z]+-\\d+$"
  code_repo:
    type: string
    required: false

state:
  criteria:
    strategy: overwrite
  test_classification:
    strategy: overwrite
  test_results:
    strategy: overwrite

outputs:
  test_results:
    node: execute_tests
    field: test_results
  passed:
    node: execute_tests
    field: passed
  failed:
    node: execute_tests
    field: failed
  total:
    node: execute_tests
    field: total

nodes:
  - id: load_criteria
    name: Load Criteria
    type: bash
    script: |
      npx tsx ~/.claude/skills/issues/get_issue.ts "{\"issue_key\": \"$issue_key\", \"fields\": \"description,comment\"}"
    output_format: json
    writes:
      - criteria

  - id: classify_tests
    name: Classify Test Type
    type: bash
    depends_on:
      - load_criteria
    script: |
      # Determine test type from repo and criteria
      repo="${code_repo:-unknown}"
      classification="unit"
      if echo "$criteria" | grep -q "e2e\|E2E\|end-to-end"; then
        classification="e2e"
      elif echo "$criteria" | grep -q "UI\|frontend"; then
        classification="ui"
      elif echo "$criteria" | grep -q "API\|backend"; then
        classification="api"
      fi
      echo "{\"test_type\": \"$classification\", \"repo\": \"$repo\"}"
    output_format: json
    reads:
      - criteria
    writes:
      - test_classification

  - id: execute_tests
    name: Execute Tests
    type: bash
    depends_on:
      - classify_tests
    script: |
      # Execute tests based on classification
      # This is a stub - actual execution varies by repo
      echo '{"test_results": "PASS", "passed": 5, "failed": 0, "total": 5, "auth_status": "not_required"}'
    output_format: json
    reads:
      - test_classification
    writes:
      - test_results
