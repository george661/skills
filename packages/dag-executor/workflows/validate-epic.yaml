---
name: Validate Epic Workflow
config:
  checkpoint_prefix: vale
  worktree: false
  labels:
    on_failure: "outcome:epic-incomplete"
  on_exit:
    - id: cost_capture
      type: bash
      script: "python3 scripts/capture_session_cost.py --command validate-epic"
      run_on: [completed, failed]

inputs:
  epic:
    type: string
    required: true
    pattern: "^[A-Z]+-\\d+$"
  audit_only:
    type: boolean
    required: false
    default: false

state:
  spec:
    strategy: overwrite
  children_audit:
    strategy: overwrite
  artifact_audit:
    strategy: overwrite
  ac_coverage:
    strategy: overwrite
  seam_findings:
    strategy: overwrite
  invariants:
    strategy: overwrite
  verdict:
    strategy: overwrite
  transition_result:
    strategy: overwrite

outputs:
  verdict: {node: produce_verdict, field: verdict}
  report_path: {node: produce_verdict, field: report_path}

# ────────────────────────────────────────────────────────────────────
# Routing overview:
#
#   Phase 0:    resume_check (checkpoint load)
#   Phase 0.5:  load_spec (PRP + repo resolution) [context:shared]
#   Phase 1:    audit_children (command → stub workflow)
#               ├─ failures + not audit_only → produce_verdict
#               ├─ failures + audit_only → audit_artifacts
#               └─ no failures → audit_artifacts (continue)
#   Phase 2:    audit_artifacts (command → stub workflow)
#   Phase 3:    ac_reconciliation [context:shared]
#   Phase 4:    integration_check [context:shared]
#               ├─ design_session != 'None' → invariants_audit
#               └─ design_session == 'None' → produce_verdict
#   Phase 5:    invariants_audit [context:shared, conditional]
#   Phase 6:    produce_verdict [context:shared,
#                                trigger_rule:one_success]
#   Phase 7:    transition_epic [context:shared]
#   Phase 8:    store_episode
#   Phase 9:    print_summary
#
# Key v3 fixes:
# - NO $ prefix in edge conditions (use bare names like
#   audit_children.hard_gate_failures)
# - Python boolean operators (and, or, not)
# - trigger_rule:one_success on produce_verdict accepts multiple paths
# ────────────────────────────────────────────────────────────────────

nodes:

  # ══════════════════════════════════════════════════════════════════
  # Phase 0: Resume Check
  # ══════════════════════════════════════════════════════════════════

  - id: resume_check
    name: Resume Check
    type: bash
    script: |
      python3 ~/.claude/hooks/checkpoint.py load $epic 2>/dev/null ||
        echo '{"found":false}'
    output_format: json

  # ══════════════════════════════════════════════════════════════════
  # Phase 0.5: Load Spec (PRP + Repo Resolution)
  # ══════════════════════════════════════════════════════════════════

  - id: load_spec
    name: Load Epic Spec
    type: prompt
    depends_on:
      - resume_check
    model: opus
    mode: agent          # needs harness: fetches Jira, reads PRP file from disk
    context: shared
    output_format: json
    writes:
      - spec
    prompt: |
      Fetch the Jira epic $epic and the PRP document it references, then
      reply with ONLY a single JSON object inside a ```json code fence —
      no prose, no markdown tables, no summary outside the fence.

      Use:
      - `npx tsx ~/.claude/skills/jira/get_issue.ts '{"issue_key": "$epic"}'`
        to read the epic's description for the PRP reference.
      - `Read` or `cat` the PRP markdown file to count AC checkboxes.

      Return this exact shape:

      ```json
      {
        "prp_reference": "PRP-XXX-NNN",
        "affected_repos": "repo1 repo2",
        "design_session": "<session-id> or None",
        "ac_count": <integer>
      }
      ```

      Do not include any other text. The workflow parses this response and
      will fail if extra keys or prose leak in.

  # ══════════════════════════════════════════════════════════════════
  # Phase 1: Audit Children
  # ══════════════════════════════════════════════════════════════════

  - id: audit_children
    name: Audit Epic Children
    type: command
    depends_on:
      - load_spec
    command: validate-epic-audit-children
    dispatch: local
    inputs_map:
      epic: "$epic"
    writes:
      - children_audit
    edges:
      - target: produce_verdict
        condition: >-
          audit_children.hard_gate_failures > 0 and not audit_only
      - target: audit_artifacts
        condition: >-
          audit_children.hard_gate_failures > 0 and audit_only
      - target: audit_artifacts
        default: true

  # ══════════════════════════════════════════════════════════════════
  # Phase 2: Audit Artifacts
  # ══════════════════════════════════════════════════════════════════

  - id: audit_artifacts
    name: Audit Epic Artifacts
    type: command
    depends_on:
      - audit_children
    command: validate-epic-audit-artifacts
    dispatch: local
    inputs_map:
      epic: "$epic"
      repos: "$load_spec.affected_repos"
    writes:
      - artifact_audit

  # ══════════════════════════════════════════════════════════════════
  # Phase 3: AC Reconciliation
  # ══════════════════════════════════════════════════════════════════

  - id: ac_reconciliation
    name: AC Reconciliation
    type: prompt
    depends_on:
      - audit_artifacts
    model: sonnet
    mode: completion     # pure reasoning over upstream audit outputs
    context: shared
    output_format: json
    writes:
      - ac_coverage
    prompt: |
      You are analyzing epic validation results. Reply with ONLY a single
      JSON object in a ```json code fence — no prose, no tables, no
      explanation outside the fence.

      Epic: $epic
      PRP: $load_spec.prp_reference
      AC Count: $load_spec.ac_count
      Children Done: $audit_children.children_done /
        $audit_children.children_total

      Respond with:

      ```json
      {
        "ac_coverage_percent": <0-100 integer>,
        "uncovered_acs": ["<AC-key>", ...],
        "findings": "<one-sentence summary of coverage gaps>"
      }
      ```

  # ══════════════════════════════════════════════════════════════════
  # Phase 4: Integration Seams Check
  # ══════════════════════════════════════════════════════════════════

  - id: integration_check
    name: Integration Seams Check
    type: prompt
    depends_on:
      - ac_reconciliation
    model: sonnet
    mode: completion     # pure reasoning; load_spec already collected repo list
    context: shared
    output_format: json
    writes:
      - seam_findings
    prompt: |
      You are analyzing cross-repo integration seams. Reply with ONLY a
      single JSON object in a ```json code fence — no prose outside the
      fence.

      Epic: $epic
      Affected Repos: $load_spec.affected_repos

      Check for:
      - Cross-repo API contract consistency
      - Shared type definitions
      - Event schema compatibility

      ```json
      {
        "seam_issues": ["<issue>", ...],
        "recommendations": "<summary or 'None'>"
      }
      ```
    edges:
      - target: invariants_audit
        condition: "load_spec.design_session != 'None'"
      - target: produce_verdict
        default: true

  # ══════════════════════════════════════════════════════════════════
  # Phase 5: Invariants Audit (Conditional)
  # ══════════════════════════════════════════════════════════════════

  - id: invariants_audit
    name: Design Invariants Audit
    type: prompt
    depends_on:
      - integration_check
    model: sonnet
    mode: completion     # pure reasoning over design session data in upstream state
    context: shared
    output_format: json
    writes:
      - invariants
    prompt: |
      You are auditing design-session invariants. Reply with ONLY a single
      JSON object in a ```json code fence — no prose outside the fence.

      Epic: $epic
      Design Session: $load_spec.design_session

      Verify that the implementation respects:
      - Architectural constraints
      - Performance requirements
      - Security boundaries

      ```json
      {
        "invariants_violated": ["<INV-key>", ...],
        "invariants_satisfied": ["<INV-key>", ...]
      }
      ```

  # ══════════════════════════════════════════════════════════════════
  # Phase 6: Produce Verdict
  # ══════════════════════════════════════════════════════════════════

  - id: produce_verdict
    name: Produce Validation Verdict
    type: prompt
    depends_on:
      - audit_children
      - invariants_audit
    trigger_rule: one_success
    model: sonnet
    mode: completion     # pure synthesis of upstream audit findings
    context: shared
    output_format: json
    writes:
      - verdict
    prompt: |
      You are producing a final validation verdict. Reply with ONLY a
      single JSON object in a ```json code fence — no prose outside the
      fence.

      Epic: $epic
      Children Audit: $audit_children.hard_gate_failures failures
      Artifact Audit: $audit_artifacts.hard_gate_failures failures
      AC Coverage: $ac_reconciliation.ac_coverage_percent%

      Verdict rules:
      - APPROVED: zero failures, coverage >= 90
      - INCOMPLETE: coverage 60-89 or minor gate failures
      - BLOCKED: major gate failures or coverage < 60

      ```json
      {
        "verdict": "APPROVED" | "INCOMPLETE" | "BLOCKED",
        "report_path": "/tmp/validate-epic-$epic-report.md",
        "summary": "<one-sentence summary>"
      }
      ```

  # ══════════════════════════════════════════════════════════════════
  # Phase 7: Transition Epic
  # ══════════════════════════════════════════════════════════════════

  - id: transition_epic
    name: Transition Epic in Jira
    type: prompt
    depends_on:
      - produce_verdict
    # Dry-run mode: skip the actual Jira mutation. produce_verdict still
    # ran, and the verdict is available in the channel for downstream
    # bookkeeping / print_summary.
    when: "not audit_only"
    model: opus
    mode: agent          # drives Jira: transitions, label updates, comment posting
    context: shared
    output_format: json
    writes:
      - transition_result
    prompt: |
      Apply the Jira transition for epic $epic based on the validation
      verdict below, then reply with ONLY a single JSON object inside a
      ```json code fence — no prose outside the fence.

      Verdict: $produce_verdict.verdict

      Action rules:
      - APPROVED: transition the epic to Done using
        `~/.claude/skills/jira/list_transitions.ts` then
        `~/.claude/skills/jira/transition_issue.ts`.
      - INCOMPLETE: add label "outcome:epic-incomplete" via
        `~/.claude/skills/jira/update_issue.ts`.
      - BLOCKED: add label "needs-human" via the same skill.

      ```json
      {
        "transition": "Done" | "None",
        "labels_added": ["<label>", ...]
      }
      ```

  # ══════════════════════════════════════════════════════════════════
  # Phase 8: Store Episode
  # ══════════════════════════════════════════════════════════════════

  - id: store_episode
    name: Store Episode in AgentDB
    type: bash
    depends_on:
      - transition_epic
    # Run after transition_epic regardless of whether it ran or was skipped
    # (audit_only mode skips the Jira mutation via when: on that node).
    trigger_rule: all_done
    # Episode storage is bookkeeping — a failure here should not block
    # the print_summary tail or fail the whole workflow.
    on_failure: continue
    reads:
      - verdict
    script: |
      # GW-5356: build the payload with jq so string values are
      # properly JSON-encoded. The verdict channel holds the scalar
      # verdict string ("APPROVED" | "INCOMPLETE" | "BLOCKED") because
      # the prompt runner spreads dict keys onto matching state
      # channels; the report_path and summary from produce_verdict's
      # output aren't declared as channels and aren't available here.
      payload=$(jq -nc \
        --arg session "${TENANT_NAMESPACE:-default}" \
        --arg task "validate-epic-$epic" \
        --arg epic "$epic" \
        --arg verdict "$verdict" \
        '{
          session_id: $session,
          task: $task,
          input: {epic: $epic, verdict: $verdict},
          output: ("validate-epic verdict: " + $verdict),
          reward: (if $verdict == "APPROVED" then 1 else 0 end),
          success: ($verdict == "APPROVED"),
          critique: ("Validation verdict: " + $verdict)
        }')
      npx tsx ~/.claude/skills/agentdb/reflexion_store_episode.ts "$payload"

  # ══════════════════════════════════════════════════════════════════
  # Phase 9: Print Summary
  # ══════════════════════════════════════════════════════════════════

  - id: print_summary
    name: Print Summary
    type: prompt
    depends_on:
      - store_episode
    # Summary is cosmetic; still produce it even if episode storage failed.
    trigger_rule: all_done
    model: sonnet
    mode: completion     # formatting markdown from workflow state
    prompt: |
      Print a human-readable summary of the validation results.

      Epic: $epic
      Verdict: $produce_verdict.verdict
      Report: $produce_verdict.report_path

      Format as markdown with sections for:
      - Executive Summary
      - Children Audit Results
      - Artifacts Audit Results
      - AC Coverage
      - Final Verdict
