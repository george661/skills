---
name: Create Implementation Plan Command Sub-DAG
config:
  checkpoint_prefix: create-impl-plan
  worktree: false
  labels:
    on_failure: "outcome:plan-creation-failed"
  on_exit:
    - id: cost_capture
      type: bash
      script: "python3 scripts/capture_session_cost.py --command create-implementation-plan"
      run_on: [completed, failed]

inputs:
  issue_key:
    type: string
    required: true
    pattern: "^[A-Z]+-\\d+$"

state:
  issue_data:
    type: dict
    reducer: overwrite
  issue_type:
    type: string
    reducer: overwrite
  feasibility:
    type: dict
    reducer: overwrite
  worktree_info:
    type: dict
    reducer: overwrite
  plan:
    type: dict
    reducer: overwrite
  validation_criteria:
    type: dict
    reducer: overwrite
  errors:
    type: list
    reducer: append
    default: []

nodes:
  # ──────────────────────────────────────────────────────────
  # Phase 0: AgentDB Health Check and Pattern Retrieval
  # ──────────────────────────────────────────────────────────
  - id: agentdb_health
    name: AgentDB Health Check
    type: bash
    script: |
      # Check AgentDB connectivity
      cd $PROJECT_ROOT && npx tsx ~/.claude/skills/agentdb/reflexion_retrieve_relevant.ts \
        '{"session_id": "gw", "task": "health-check", "k": 1}' > /dev/null 2>&1
      echo '{"status": "healthy"}'
    output_format: json

  - id: retrieve_patterns
    name: Retrieve Implementation Patterns
    type: bash
    depends_on:
      - agentdb_health
    script: |
      # Retrieve planning patterns from AgentDB.
      # Build request with jq so TENANT_NAMESPACE expands (single-quoted JSON
      # would ship the literal "${TENANT_NAMESPACE}" instead).
      request=$(jq -n \
        --arg session_id "$TENANT_NAMESPACE" \
        '{session_id: $session_id, task: "implementation-patterns", k: 5}')
      cd $PROJECT_ROOT && npx tsx ~/.claude/skills/agentdb/reflexion_retrieve_relevant.ts "$request"
    output_format: json

  - id: fetch_issue
    name: Fetch Issue from Jira
    type: bash
    depends_on:
      - agentdb_health
    writes:
      - issue_data
    on_failure: stop
    script: |
      issue=$(npx tsx ~/.claude/skills/jira/get_issue.ts \
        '{"issue_key": "$issue_key", "fields": "summary,description,labels,status,issuelinks"}')
      echo "{\"issue_data\": $issue}"
    output_format: json

  # ──────────────────────────────────────────────────────────
  # Phase 0.5: Domain Context Discovery
  # ──────────────────────────────────────────────────────────
  - id: domain_context
    name: Domain Context Discovery
    type: bash
    depends_on:
      - fetch_issue
    reads:
      - issue_data
    script: |
      # Search for domain context and related design artifacts
      echo '{"domain_context": "discovered"}'
    output_format: json

  # ──────────────────────────────────────────────────────────
  # Phase 0.7: File Discovery
  # ──────────────────────────────────────────────────────────
  # GW-6062: tightened prompt + bounded timeout to prevent the failure
  # mode seen on 2026-05-20 run 120bc119: vague prompt + no JSON
  # discipline + no timeout caused the model to bail in 250ms with
  # "(no output)", halting the entire /work pipeline at Phase 0.7.
  # Same pattern as GW-6043 fix — see PR #210 for the rationale.
  - id: file_discovery
    name: File Discovery and Feasibility Scan
    type: prompt
    depends_on:
      - domain_context
      - retrieve_patterns
    reads:
      - issue_data
    writes:
      - feasibility
    prompt: |
      Identify the files this issue is most likely to touch.

      The issue contents are already on the `issue_data` channel — read it
      with: `npx tsx ~/.claude/skills/jira/get_issue.ts '{"issue_key":"$issue_key","fields":"summary,description,labels"}'`
      (the upstream `fetch_issue` node already cached this; running the
      command again is fine and keeps the prompt self-contained).

      For locating files use `grep -rl` or `find` SCOPED to the current
      project root only — do NOT walk $HOME or /. If the issue mentions
      a specific file or module name, that's the strongest signal; jump
      straight to it.

      DO NOT read every file you find. List paths and a one-line reason
      per file. Aim for 3-8 candidate paths; if you can't find any with
      ~5 grep calls, return the empty list with complexity "unknown".

      Output a SINGLE JSON object (no prose, no markdown, no code fences):
      {
        "feasibility": {
          "files_to_change": [
            {"path": "<repo-relative path>", "reason": "<one line>"}
          ],
          "complexity": "low|medium|high|unknown",
          "notes": "<one short sentence on confidence or caveats>"
        }
      }

      If the issue is too vague to identify any file, default to:
      {"feasibility": {"files_to_change": [], "complexity": "unknown", "notes": "issue did not identify concrete files"}}
    model: opus
    dispatch: inline
    # GW-6062: fresh context — without this the planning sub-workflow
    # inherits the parent's session and Claude treats this prompt as a
    # continuation of `prior_work_assessment` (which already produced a
    # final answer in that session), exits in <300ms with "(no output)".
    context: fresh
    output_format: json
    timeout: 180  # 3 min — same budget as prior_work_assessment
    checkpoint: true

  # ──────────────────────────────────────────────────────────
  # Phase 0.8: Already-Implemented Check and Gate
  # ──────────────────────────────────────────────────────────
  - id: already_impl_check
    name: Check if Already Implemented
    type: prompt
    depends_on:
      - file_discovery
    reads:
      - issue_data
      - feasibility
    prompt: |
      Determine whether issue $issue_key is already implemented.

      Read the issue with:
        npx tsx ~/.claude/skills/jira/get_issue.ts \
          '{"issue_key":"$issue_key","fields":"summary,description"}'

      Then check the candidate files from the upstream feasibility analysis.
      Look for: function/class names that match the issue's requirement,
      tests covering the requirement, or recent commits referencing
      $issue_key. ~5 grep/Read calls max — do NOT walk the codebase.

      Output a SINGLE JSON object (no prose, no markdown, no code fences):
      {
        "already_implemented": true|false,
        "evidence": "<one line: file path + symbol if true, or absence reason if false>"
      }

      If you cannot determine in ~5 calls, default to:
      {"already_implemented": false, "evidence": "could not confirm in budget; assume not implemented"}
    model: opus
    dispatch: inline
    # GW-6062: fresh context — see file_discovery comment above.
    context: fresh
    output_format: json
    timeout: 180

  - id: already_impl_gate
    name: Already Implemented Gate
    type: gate
    depends_on:
      - already_impl_check
    condition: "$already_impl_check.already_implemented == false"
    on_failure: stop

  # ──────────────────────────────────────────────────────────
  # Phase 1.1: Transition Issue to In Progress
  # ──────────────────────────────────────────────────────────
  - id: transition_in_progress
    name: Transition Issue to In Progress
    type: bash
    depends_on:
      - already_impl_gate
    # GW-6106: look up the transition ID at runtime — transition IDs vary
    # by Jira project, and the skill's `transition_id` parameter expects
    # the integer string (e.g. "21"), not the workflow status name.
    # Idempotent: if the issue is already In Progress (or no such transition
    # is available from the current status), $in_progress_id is empty and
    # the transition call is skipped without erroring.
    script: |
      transitions=$(npx tsx ~/.claude/skills/jira/list_transitions.ts \
        "{\"issue_key\": \"$issue_key\"}")
      in_progress_id=$(echo "$transitions" | jq -r \
        '.transitions[] | select(.name == "In Progress") | .id')
      if [ -n "$in_progress_id" ]; then
        npx tsx ~/.claude/skills/jira/transition_issue.ts \
          "{\"issue_key\": \"$issue_key\", \"transition_id\": \"$in_progress_id\", \"notify_users\": false}"
      else
        echo "Issue $issue_key already In Progress (or transition unavailable); skipping."
      fi

  # ──────────────────────────────────────────────────────────
  # Phase 1.2: Classify Issue Type
  # ──────────────────────────────────────────────────────────
  - id: classify_issue_type
    name: Classify Issue Type
    type: prompt
    depends_on:
      - transition_in_progress
    reads:
      - issue_data
      - feasibility
    writes:
      - issue_type
    prompt: |
      Classify issue $issue_key into one of the implementation categories
      below, based on its description and the upstream feasibility analysis
      (paths the issue touches).

      Categories — pick exactly one:
      - BACKEND_LOGIC      — Python/Go/server-side modules, no API surface change
      - API_ENDPOINT       — new or modified HTTP route, schema, contract
      - UI_COMPONENT       — frontend (React, JS, CSS, HTML, static assets)
      - DATABASE_MIGRATION — schema/DDL change, data backfill
      - INFRA              — Terraform, CI, deploy configs
      - TEST_ONLY          — test file changes only
      - DOCS_ONLY          — docs/markdown only
      - REFACTOR           — pure restructuring, no behavior change
      - OTHER              — none of the above (provide a one-word tag in evidence)

      DO NOT walk the filesystem — the upstream feasibility node already
      identified the candidate paths.

      Output a SINGLE JSON object (no prose, no markdown, no code fences):
      {
        "issue_type": "<one of the categories above>",
        "evidence": "<one line citing the paths or prose that drove the choice>"
      }

      If ambiguous, default to:
      {"issue_type": "OTHER", "evidence": "could not classify confidently"}
    model: opus
    dispatch: inline
    # GW-6062: fresh context.
    context: fresh
    output_format: json
    timeout: 180

  # ──────────────────────────────────────────────────────────
  # Phase 1.3: Multi-Repo Check
  # ──────────────────────────────────────────────────────────
  - id: multi_repo_check
    name: Multi-Repo Check
    type: bash
    depends_on:
      - classify_issue_type
    reads:
      - feasibility
    script: |
      # Check if changes span multiple repos
      echo '{"multi_repo": false, "primary_repo": "skills"}'
    output_format: json

  # ──────────────────────────────────────────────────────────
  # Phase 2: Create Worktree
  # ──────────────────────────────────────────────────────────
  - id: create_worktree
    name: Create Worktree
    type: bash
    depends_on:
      - multi_repo_check
    writes:
      - worktree_info
    checkpoint: true
    script: |
      # Create git worktree for the issue. GW-6106: must `cd $PROJECT_ROOT`
      # (the source repo) before `git worktree add`; the bash runner's
      # default CWD isn't guaranteed to be inside the repo. Use `set -e`
      # so a failed `git worktree add` propagates instead of silently
      # producing a worktree_info that points at a non-existent path
      # (downstream write_agent_context then fails with "No such file").
      set -e
      cd "${PROJECT_ROOT}"
      repo_name=$(basename "$(pwd)")
      branch_slug=$(echo "$issue_key" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
      branch="$issue_key/$branch_slug"
      worktree_dir="${PROJECT_ROOT}/../${repo_name}-worktrees/$issue_key"

      mkdir -p "$(dirname "$worktree_dir")"
      # Re-use an existing worktree if a prior run already created one
      # for this issue (e.g. /work re-trigger after a downstream failure).
      # Redirect git's stdout to stderr so only our JSON ends up on
      # stdout — the executor parses stdout for `output_format: json`
      # channel writes, and git's "branch X set up to track..." line
      # would otherwise prefix the JSON and break json.loads.
      if [ ! -d "$worktree_dir" ]; then
        git worktree add "$worktree_dir" -b "$branch" origin/main >&2
      else
        echo "Reusing existing worktree at $worktree_dir" >&2
      fi

      # Canonicalize the worktree path so downstream nodes (write_agent_context,
      # implement, etc.) get a path without `..` segments — those segments
      # work for `cd` but break path-joins that don't normalize.
      worktree_dir=$(cd "$worktree_dir" && pwd)

      jq -nc \
        --arg worktree_path "$worktree_dir" \
        --arg branch "$branch" \
        --arg repo "$repo_name" \
        '{worktree_info: {worktree_path: $worktree_path, branch: $branch, repo: $repo},
          worktree_path: $worktree_path, branch: $branch, repo: $repo}'
    output_format: json

  # ──────────────────────────────────────────────────────────
  # Phase 3.1: Write Implementation Plan
  # ──────────────────────────────────────────────────────────
  - id: write_plan
    name: Write Implementation Plan
    type: prompt
    depends_on:
      - create_worktree
    reads:
      - issue_data
      - issue_type
      - feasibility
      - worktree_info
    writes:
      - plan
      - validation_criteria
    prompt: |
      Write a TDD implementation plan for issue $issue_key.

      Read the issue with:
        npx tsx ~/.claude/skills/jira/get_issue.ts \
          '{"issue_key":"$issue_key","fields":"summary,description,labels"}'

      Use the upstream `feasibility` and `issue_type` channels to scope the
      plan — do NOT re-discover files. ~10 tool calls max.

      Output a SINGLE JSON object (no prose, no markdown, no code fences):
      {
        "plan": {
          "summary": "<one paragraph: what + why>",
          "files_to_change": [
            {"path": "<repo-relative>", "change": "<one line: what changes>"}
          ],
          "tests_to_write": [
            {"path": "<test path>", "case": "<one line: what it asserts>"}
          ],
          "approach": "<RED-GREEN-REFACTOR or other; one line>"
        },
        "validation_criteria": {
          "acceptance_criteria": ["<AC bullet>", "..."],
          "validation_commands": ["<command line to run pre-merge>"]
        }
      }

      If the issue is too vague, default to:
      {"plan": {"summary": "issue too vague to plan; needs grooming", "files_to_change": [], "tests_to_write": [], "approach": "blocked"},
       "validation_criteria": {"acceptance_criteria": [], "validation_commands": []}}
    model: opus
    dispatch: inline
    # GW-6062: fresh context.
    context: fresh
    output_format: json
    timeout: 300  # plan is the heaviest prompt; give 5 min
    checkpoint: true

  # ──────────────────────────────────────────────────────────
  # Phase 3.3: Post Plan to Jira
  # ──────────────────────────────────────────────────────────
  - id: post_plan_jira
    name: Post Plan to Jira
    type: bash
    depends_on:
      - write_plan
    reads:
      - plan
    script: |
      # Post implementation plan as Jira comment. GW-6106: build with jq
      # so the plan body's quotes/newlines/special chars don't break the
      # outer JSON.
      set -e
      plan_text=$(echo "${plan:-{\}}" | jq -r '.plan_markdown // .summary // "Plan created"')
      body_text=$(printf '## Implementation Plan\n\n%s' "$plan_text")
      payload=$(jq -nc \
        --arg issue_key "$issue_key" \
        --arg body "$body_text" \
        '{issue_key: $issue_key, body: $body}')
      npx tsx ~/.claude/skills/jira/add_comment.ts "$payload"

  # ──────────────────────────────────────────────────────────
  # Phase 3.4: Store Validation Criteria in AgentDB
  # ──────────────────────────────────────────────────────────
  - id: store_validation
    name: Store Validation Criteria
    type: bash
    depends_on:
      - post_plan_jira
    reads:
      - plan
      - validation_criteria
    script: |
      # Store validation criteria in AgentDB. GW-6106: build the JSON
      # payload with jq so the channel-injected JSON value is embedded
      # without breaking the outer string's quoting. The previous
      # in-line `"input": $validation_criteria` substitution produced
      # nested unescaped double quotes that bash mis-parsed, leaving
      # the skill with no input at all ("Required fields: session_id,
      # task, reward, success").
      payload=$(jq -n \
        --arg session_id "${TENANT_NAMESPACE:-default}" \
        --arg task "validation-$issue_key" \
        --argjson input "${validation_criteria:-{\}}" \
        '{session_id: $session_id, task: $task, input: $input, output: "stored", reward: 0.5, success: true}')
      npx tsx ~/.claude/skills/agentdb/reflexion_store_episode.ts "$payload"

  # ──────────────────────────────────────────────────────────
  # Phase 3.5: Store Implementation Context in AgentDB
  # ──────────────────────────────────────────────────────────
  - id: store_impl_context
    name: Store Implementation Context
    type: bash
    depends_on:
      - store_validation
    reads:
      - plan
      - worktree_info
    script: |
      # Store full implementation plan in AgentDB. GW-6106: build via jq
      # for the same reason as store_validation — channel values that are
      # JSON dicts can't be safely interpolated into a manually-quoted
      # string. The dotted refs (worktree_info.worktree_path) work
      # because the executor pre-substitutes them; channel JSON values
      # come through as env vars so jq with --argjson is the safe
      # transport.
      payload=$(jq -n \
        --arg session_id "${TENANT_NAMESPACE:-default}" \
        --arg task "impl-plan-$issue_key" \
        --arg issue_key "$issue_key" \
        --arg worktree_path "${worktree_info.worktree_path}" \
        --arg branch "${worktree_info.branch}" \
        --argjson plan "${plan:-{\}}" \
        '{
          session_id: $session_id,
          task: $task,
          input: {issue_key: $issue_key, worktree_path: $worktree_path, branch: $branch},
          output: ($plan | tostring),
          reward: 0.8,
          success: true
        }')
      npx tsx ~/.claude/skills/agentdb/reflexion_store_episode.ts "$payload"

  # ──────────────────────────────────────────────────────────
  # Phase 3.6: Write Agent Context File
  # ──────────────────────────────────────────────────────────
  - id: write_agent_context
    name: Write Agent Context File
    type: bash
    depends_on:
      - store_impl_context
    reads:
      - worktree_info
      - issue_type
    script: |
      # Write .agent-context.json to worktree. GW-6106: build via jq
      # for safe quoting; pull the path out of the channel JSON in bash
      # so it works whether the executor's dotted-ref substitution
      # ($worktree_info.worktree_path) does the right thing or not.
      set -e
      worktree_path=$(echo "${worktree_info}" | jq -r '.worktree_path')
      branch=$(echo "${worktree_info}" | jq -r '.branch')
      jq -n \
        --arg issue_key "$issue_key" \
        --arg issue_type "${issue_type:-Task}" \
        --arg worktree_path "$worktree_path" \
        --arg branch "$branch" \
        '{issue_key: $issue_key, issue_type: $issue_type, worktree_path: $worktree_path, branch: $branch}' \
        > "$worktree_path/.agent-context.json"

  # ──────────────────────────────────────────────────────────
  # Phase 3.7: Add Outcome Label
  # ──────────────────────────────────────────────────────────
  - id: add_outcome_label
    name: Add Outcome Label
    type: bash
    depends_on:
      - write_agent_context
    script: |
      # GW-6106: build args with jq + --arg so quoting/escaping is safe
      # and `$issue_key` is bash-expanded (the previous single-quoted
      # form `'{"issue_key": "$issue_key"...}'` left $issue_key literal,
      # which 404'd at the Jira API).
      set -e
      get_payload=$(jq -nc --arg issue_key "$issue_key" \
        '{issue_key: $issue_key, fields: "labels"}')
      issue=$(npx tsx ~/.claude/skills/jira/get_issue.ts "$get_payload")
      labels=$(echo "$issue" | jq -c '.fields.labels // [] | map(select(startswith("outcome:") | not)) + ["outcome:success-plan-created"]')
      update_payload=$(jq -nc \
        --arg issue_key "$issue_key" \
        --argjson labels "$labels" \
        '{issue_key: $issue_key, labels: $labels, notify_users: false}')
      npx tsx ~/.claude/skills/jira/update_issue.ts "$update_payload"

outputs:
  worktree_path:
    node: create_worktree
    field: worktree_path
  branch:
    node: create_worktree
    field: branch
  issue_type:
    node: classify_issue_type
    field: issue_type
