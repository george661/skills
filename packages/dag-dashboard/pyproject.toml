[project]
name = "dag-dashboard"
version = "0.1.0"
description = "Web dashboard for DAG workflow execution monitoring"
authors = [
    {name = "General Wisdom", email = "engineering@generalwisdom.com"}
]
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "watchdog>=3.0,<5.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0",
    "httpx>=0.24.0"
]

[project.scripts]
dag-dashboard = "dag_dashboard.__main__:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dag_dashboard = ["static/**/*", "static/**/**/*"]

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
