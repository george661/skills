<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAG Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <h1 class="header-title">DAG Dashboard</h1>
                <span id="gate-indicator" class="gate-indicator hidden"></span>
                <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle menu">
                    <span class="hamburger"></span>
                </button>
            </div>
        </header>
        
        <div class="container">
            <aside id="sidebar" class="sidebar">
                <nav class="nav">
                    <a href="#/" class="nav-link active" data-route="/">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                    <a href="#/history" class="nav-link" data-route="/history">
                        <span class="nav-icon">📜</span>
                        <span class="nav-text">History</span>
                    </a>
                    <a href="#/checkpoints" class="nav-link" data-route="/checkpoints">
                        <span class="nav-icon">💾</span>
                        <span class="nav-text">Checkpoints</span>
                    </a>
                </nav>
            </aside>
            
            <main id="main-content" class="main-content">
                <div id="route-container"></div>
            </main>
        </div>
        
        <nav id="mobile-nav" class="mobile-nav hidden">
            <a href="#/" class="mobile-nav-link" data-route="/">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="#/history" class="mobile-nav-link" data-route="/history">
                <span class="nav-icon">📜</span>
                <span class="nav-text">History</span>
            </a>
            <a href="#/checkpoints" class="mobile-nav-link" data-route="/checkpoints">
                <span class="nav-icon">💾</span>
                <span class="nav-text">Checkpoints</span>
            </a>
        </nav>
    </div>
    
    <script src="/js/sse.js"></script>
    <script src="/js/dag-renderer.js"></script>
    <script src="/js/node-detail-panel.js"></script>
    <script src="/js/channel-state-panel.js"></script>
    <script src="/js/state-diff-timeline.js"></script>
    <script src="/js/checkpoint-browser.js"></script>
    <script src="/js/replay-form.js"></script>
    <script src="/js/vendor/dompurify.min.js"></script>
    <script src="/js/vendor/marked.min.js"></script>
    <script src="/js/chat-panel.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
