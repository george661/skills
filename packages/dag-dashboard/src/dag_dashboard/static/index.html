<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAG Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/js/builder/node-library.css">
    <!-- React Flow + builder styles. Linked up front so the Builder canvas
         renders correctly even if the bundle arrives before the async CSS
         loader fires. 15KB, harmless on non-builder pages. -->
    <link rel="stylesheet" href="/js/builder/builder.css">
    <script>
        // Apply theme BEFORE first paint to avoid a flash of the wrong palette.
        // Precedence: localStorage override > OS prefers-color-scheme > light.
        (function () {
            try {
                var stored = localStorage.getItem('dag-dashboard-theme');
                var theme = stored
                    || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                /* localStorage unavailable (privacy mode) — fall back to light */
            }
        })();
    </script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <h1 class="header-title">DAG Dashboard</h1>
                <span id="gate-indicator" class="gate-indicator hidden"></span>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <span class="theme-toggle-icon">🌙</span>
                </button>
                <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle menu">
                    <span class="hamburger"></span>
                </button>
            </div>
        </header>
        
        <div class="container">
            <aside id="sidebar" class="sidebar">
                <div id="search-bar-container-desktop"></div>
                <nav class="nav">
                    <a href="#/" class="nav-link active" data-route="/">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                    <a href="#/workflows" class="nav-link" data-route="/workflows">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Workflows</span>
                    </a>
                    <a href="#/history" class="nav-link" data-route="/history">
                        <span class="nav-icon">📜</span>
                        <span class="nav-text">History</span>
                    </a>
                    <a href="#/conversations" class="nav-link" data-route="/conversations">
                        <span class="nav-icon">💬</span>
                        <span class="nav-text">Conversations</span>
                    </a>
                    <a href="#/checkpoints" class="nav-link" data-route="/checkpoints">
                        <span class="nav-icon">💾</span>
                        <span class="nav-text">Checkpoints</span>
                    </a>
                    <a href="#/settings" class="nav-link" data-route="/settings">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Settings</span>
                    </a>
                    <a href="#/builder" class="nav-link hidden" data-route="/builder">
                        <span class="nav-icon">🔧</span>
                        <span class="nav-text">Builder</span>
                    </a>
                </nav>
            </aside>
            
            <main id="main-content" class="main-content">
                <div id="route-container"></div>
            </main>
        </div>
        
        <nav id="mobile-nav" class="mobile-nav hidden">
            <div id="search-bar-container-mobile"></div>
            <a href="#/" class="mobile-nav-link" data-route="/">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="#/history" class="mobile-nav-link" data-route="/history">
                <span class="nav-icon">📜</span>
                <span class="nav-text">History</span>
            </a>
            <a href="#/workflows" class="mobile-nav-link" data-route="/workflows">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Workflows</span>
            </a>
            <a href="#/conversations" class="mobile-nav-link" data-route="/conversations">
                <span class="nav-icon">💬</span>
                <span class="nav-text">Conversations</span>
            </a>
            <a href="#/checkpoints" class="mobile-nav-link" data-route="/checkpoints">
                <span class="nav-icon">💾</span>
                <span class="nav-text">Checkpoints</span>
            </a>
            <a href="#/settings" class="mobile-nav-link" data-route="/settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Settings</span>
            </a>
            <a href="#/builder" class="mobile-nav-link hidden" data-route="/builder">
                <span class="nav-icon">🔧</span>
                <span class="nav-text">Builder</span>
            </a>
        </nav>
    </div>
    
    <script src="/js/search-bar.js"></script>
    <script src="/js/sse.js"></script>
    <script src="/js/dag-renderer.js"></script>
    <script src="/js/virtualized-log-list.js"></script>
    <script src="/js/step-logs.js"></script>
    <script src="/js/node-detail-panel.js"></script>
    <script src="/js/channel-state-panel.js"></script>
    <script src="/js/state-diff-timeline.js"></script>
    <script src="/js/checkpoint-browser.js"></script>
    <script src="/js/confirm-dialog.js"></script>
    <script src="/js/replay-form.js"></script>
    <script src="/js/rerun-form.js"></script>
    <script src="/js/cancel-button.js"></script>
    <script src="/js/retry-button.js"></script>
    <script src="/js/artifact-list.js"></script>
    <script src="/js/vendor/dompurify.min.js"></script>
    <script src="/js/vendor/marked.min.js"></script>
    <script src="/js/node-scroll-bus.js"></script>
    <script src="/js/event-to-messages.js"></script>
    <script src="/js/workflow-progress-card.js"></script>
    <script src="/js/chat-panel.js"></script>
    <script src="/js/workflows.js"></script>
    <script src="/js/settings-page.js"></script>
    <script src="/builder-config.js"></script>
    <script src="/js/node-inspector.js"></script>
    <script src="/js/resizable-split.js"></script>
    <script src="/js/state-slideover.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
