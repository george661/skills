# Team Definition: Groom
# Agent team composition for the /groom command.
# Decomposes a PRP into Jira issues with dependency ordering.
#
# Usage: /groom PROJ-123 --team
#
# The team lead orchestrates issue creation while specialized teammates
# handle PRP parsing, issue creation, dependency mapping, and quality review.

name: groom-team
command: /groom
description: >
  Multi-agent team for Epic grooming. Parallelizes PRP parsing, batch issue
  creation, dependency mapping, and multi-pass review.


agents:
  - role: parser
    agent: researcher
    count: 1
    spawn_prompt_override: |
      You are the PRP parser for the /groom team. Your job is to extract
      implementation tasks from the PRP document.

      Tasks:
      1. Locate and read the PRP document from project-docs
      2. Extract all implementation tasks with their:
         - Title and description
         - Acceptance criteria
         - Affected repository
         - Issue type classification
         - Estimated complexity
      3. Identify dependency relationships between tasks
      4. Calculate a dependency tier graph (tier 1 = no deps, tier 2 = depends on tier 1, etc.)

      Output a structured list of tasks with dependency tiers.

  - role: issue-creator
    agent: coordinator
    count: 1
    spawn_prompt_override: |
      You are the issue creator for the /groom team. Your job is to batch
      create Jira issues from the parsed PRP tasks.

      For each task:
      1. Create Jira issue with proper fields:
         - Summary, description, acceptance criteria
         - Issue type (Story, Task, Bug)
         - Labels: step:planning
         - Link to parent Epic
      2. Add dependency links between issues (blocks/is-blocked-by)
      3. Set priority based on dependency tier (tier 1 = highest)

      Create issues in dependency order (tier 1 first, then tier 2, etc.).
      Use batch creation where possible for efficiency.

  - role: issue-reviewer
    agent: reviewer
    count: 1
    spawn_prompt_override: |
      You are the issue reviewer for the /groom team. You perform quality
      reviews on the created Jira issues.

      **First Review:**
      - Each issue has clear acceptance criteria
      - Issue types are correct
      - Repository assignments are accurate
      - No duplicate or overlapping issues
      - All PRP tasks are represented

      **Architectural Review:**
      - Domain boundaries respected (correct repo per issue)
      - Dependency links are accurate and complete
      - No circular dependencies
      - Tier ordering makes sense

      **Final Review:**
      - All feedback from previous reviews incorporated
      - Issues are ready for sprint planning
      - Epic dependency graph is documented

      Report issues found with specific Jira keys and recommended fixes.

task_flow:
  - task: Parse PRP and extract implementation tasks with dependency tiers
    assigned_to: parser
    depends_on: []

  - task: Batch create Jira issues from parsed tasks
    assigned_to: issue-creator
    depends_on: [0]

  - task: First issue review (completeness, accuracy)
    assigned_to: issue-reviewer
    depends_on: [1]

  - task: Architectural review (domain boundaries, dependencies)
    assigned_to: issue-reviewer
    depends_on: [1]

  - task: Fix issues identified in reviews
    assigned_to: issue-creator
    depends_on: [2, 3]

  - task: Final review (sprint readiness)
    assigned_to: issue-reviewer
    depends_on: [4]

lead_instructions: |
  You are the team lead for the /groom workflow. Coordinate the grooming team
  to decompose a PRP into well-structured Jira issues.

  **Workflow:**
  1. Spawn all teammates
  2. Assign parser to extract tasks from the PRP document
  3. Once parsing completes, assign issue-creator to batch create Jira issues
  4. Send created issues to issue-reviewer for first review AND arch review
     (these can run in parallel on the same reviewer)
  5. If issues found, assign issue-creator to fix them
  6. Send for final review
  7. Once approved, transition all issues to To Do

  **Gates:**
  - All PRP tasks must be represented as issues
  - No orphaned dependencies (every blocked-by must have a corresponding blocks)
  - All issues must have acceptance criteria
  - Final review must pass

  After approval:
  - Transition all child issues to To Do
  - Update Epic with dependency graph comment
  - Transition Epic to To Do
  - Update labels: add outcome:groom-ready-for-sprint
  - Store metrics in AgentDB
