name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  python-packages:
    name: Python Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Find packages
        id: packages
        run: |
          pkgs=$(find packages -name pyproject.toml -printf '%h\n' 2>/dev/null || true)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pkgs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          [ -n "$pkgs" ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Install, test, type-check each package
        if: steps.packages.outputs.found == 'true'
        run: |
          set -e
          pkgs=$(printf '%s\n' "${{ steps.packages.outputs.list }}" | sort -u | sed '/^$/d')
          # Phase 1: single uv call installs every package editable so the
          # inter-package graph resolves (dag-dashboard depends on dag-executor,
          # which is not on PyPI — only editable installs satisfy that).
          uv venv .venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          install_args=()
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            install_args+=(-e "$pkg[dev]")
          done <<< "$pkgs"
          echo "::group::install all packages (editable)"
          uv pip install "${install_args[@]}"
          echo "::endgroup::"
          # Phase 2: test and type-check each package. With every package already
          # editable-installed, mypy resolves cross-package imports regardless of
          # check order.
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "::group::check $pkg"
            (cd "$pkg" && pytest tests/ -v)
            (cd "$pkg" && mypy src/)
            echo "::endgroup::"
          done <<< "$pkgs"

  promptc-validate:
    name: promptc validate (commands/ skills/ docs/)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install promptc
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          uv pip install -e packages/promptc[dev]

      - name: Validate all .md files under commands/, skills/, docs/
        run: |
          source .venv/bin/activate
          # docs/promptc-spec.md contains unquoted attr=val in prose documenting
          # the promptc syntax itself; validator cannot parse such examples.
          # Exclude by path — if the spec is ever rewritten to use fenced code
          # blocks for its examples, remove this line.
          EXCLUDE='^docs/promptc-spec\.md$'

          errors=0
          warnings=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if echo "$f" | grep -qE "$EXCLUDE"; then
              echo "SKIP (intentional exclusion): $f"
              continue
            fi
            out=$(promptc validate "$f" 2>&1)
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "FAIL: $f"
              echo "$out" | sed 's/^/  /'
              errors=$((errors + 1))
            elif echo "$out" | grep -qi 'warning'; then
              echo "WARN: $f"
              echo "$out" | sed 's/^/  /'
              warnings=$((warnings + 1))
            fi
          done < <(find commands skills docs -name '*.md' -type f | sort)

          echo ""
          echo "promptc validate summary: $errors error(s), $warnings warning(s)"
          if [ "$errors" -gt 0 ]; then
            exit 1
          fi

  promptc-evaluator-parity:
    name: promptc ⇄ simpleeval parity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install promptc + dag-executor (both bring simpleeval)
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          # promptc[dev] includes simpleeval; dag-executor is installed editable
          # so a future refactor that centralizes the evaluator is automatically
          # exercised here. If dag-executor is installed but unused by this job
          # today, the install is cheap and keeps the parity scope honest.
          uv pip install -e packages/promptc[dev] -e packages/dag-executor

      - name: Run expression parity suite
        run: |
          source .venv/bin/activate
          cd packages/promptc
          pytest tests/test_expression_parity.py -v

      - name: Assert corpus covers required surface
        run: |
          source .venv/bin/activate
          python - <<'PYEOF'
          import json, pathlib, sys
          corpus = json.loads(pathlib.Path(
              "packages/promptc/tests/fixtures/expression_parity.json"
          ).read_text())
          if len(corpus) < 10:
              sys.exit(f"corpus has {len(corpus)} cases, need >= 10 per AC3")
          ops = "== != < <= > >= and or not in".split()
          funcs = ["len", "contains", "startswith", "matches"]
          joined = " ".join(c["expr"] for c in corpus)
          missing_ops = [o for o in ops if o not in joined]
          missing_funcs = [f for f in funcs if f + "(" not in joined]
          if missing_ops:
              sys.exit(f"corpus missing operators: {missing_ops}")
          if missing_funcs:
              sys.exit(f"corpus missing functions: {missing_funcs}")
          print(f"corpus OK: {len(corpus)} cases, covers all operators + functions")
          PYEOF

  builder-bundle:
    name: Builder Bundle (React + React Flow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install builder dependencies
        run: |
          cd packages/dag-dashboard/builder
          npm ci --legacy-peer-deps

      - name: Run builder unit tests
        run: |
          cd packages/dag-dashboard/builder
          npm test

      - name: Build builder bundle
        run: |
          cd packages/dag-dashboard/builder
          npm run build

      - name: Verify bundle exists and is non-empty
        run: |
          BUNDLE="packages/dag-dashboard/src/dag_dashboard/static/js/builder/builder.js"
          if [ ! -s "$BUNDLE" ]; then
            echo "ERROR: Bundle is missing or empty at $BUNDLE"
            exit 1
          fi
          echo "✓ Bundle exists: $BUNDLE ($(wc -c < "$BUNDLE") bytes)"

          # Report gzipped size
          GZIPPED_SIZE=$(gzip -c "$BUNDLE" | wc -c)
          echo "✓ Gzipped size: $GZIPPED_SIZE bytes (~$((GZIPPED_SIZE / 1024)) KB)"

      - name: Upload builder bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: builder-bundle
          path: packages/dag-dashboard/src/dag_dashboard/static/js/builder/builder.js
          retention-days: 30

  hooks-lint:
    name: Python Hooks Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check hooks
        run: |
          errors=0
          for f in hooks/*.py; do
            python -m py_compile "$f" || errors=$((errors + 1))
          done
          exit $errors

      - name: Lint hooks
        run: ruff check hooks/ --select E,F,W --ignore E501

  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find hooks scripts -name '*.sh' -print0 | \
            xargs -0 shellcheck --severity=warning || true

  yaml-validate:
    name: YAML Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML configs
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, truthy: disable}}' \
            agents/ teams/

  dag-workflow-lint:
    name: DAG Workflow Lint
    runs-on: ubuntu-latest
    needs: [python-packages]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install dag-executor
        run: |
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install -e packages/dag-executor

      - name: Lint all DAG workflows
        run: |
          source .venv/bin/activate
          failures=0
          for wf in packages/dag-executor/workflows/*.yaml; do
            echo "Linting $wf..."
            dag-exec --dry-run "$wf" || failures=$((failures + 1))
          done
          if [ $failures -gt 0 ]; then
            echo "ERROR: $failures workflow(s) failed lint"
            exit 1
          fi
          echo "✓ All workflows passed lint"

  playwright-e2e:
    name: Playwright E2E (dag-dashboard)
    runs-on: ubuntu-latest
    needs: [builder-bundle]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install Python deps (dag-dashboard + dag-executor)
        run: |
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install -e packages/dag-executor -e "packages/dag-dashboard[dev]"

      - name: Download prebuilt builder bundle
        uses: actions/download-artifact@v4
        with:
          name: builder-bundle
          path: packages/dag-dashboard/src/dag_dashboard/static/js/builder/

      - name: Install Playwright deps
        working-directory: packages/dag-dashboard/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: packages/dag-dashboard/e2e
        env:
          CI: "true"
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/dag-dashboard/e2e/playwright-report
          retention-days: 14

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/dag-dashboard/e2e/test-results
          retention-days: 14
