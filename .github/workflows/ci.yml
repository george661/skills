name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  python-packages:
    name: Python Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Find packages
        id: packages
        run: |
          pkgs=$(find packages -name pyproject.toml -printf '%h\n' 2>/dev/null || true)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pkgs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          [ -n "$pkgs" ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Install, test, type-check each package
        if: steps.packages.outputs.found == 'true'
        run: |
          set -e
          # Sort packages for deterministic ordering across runs
          pkgs=$(printf '%s\n' "${{ steps.packages.outputs.list }}" | sort -u | sed '/^$/d')
          # Phase 1: install every package editable in a single pip call, so pip
          # resolves the inter-package dependency graph (dag-dashboard depends on
          # dag-executor, which is not on PyPI — only editable installs satisfy
          # that). Dev extras are added per-package.
          install_args=()
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            install_args+=(-e "$pkg[dev]")
          done <<< "$pkgs"
          echo "::group::install all packages (editable)"
          pip install "${install_args[@]}"
          echo "::endgroup::"
          # Phase 2: test and type-check each package. With every package already
          # editable-installed, mypy can resolve cross-package imports (e.g.
          # dag_executor → dag_dashboard.notifier) regardless of check order.
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "::group::check $pkg"
            (cd "$pkg" && pytest tests/ -v)
            (cd "$pkg" && mypy src/)
            echo "::endgroup::"
          done <<< "$pkgs"

  hooks-lint:
    name: Python Hooks Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check hooks
        run: |
          errors=0
          for f in hooks/*.py; do
            python -m py_compile "$f" || errors=$((errors + 1))
          done
          exit $errors

      - name: Lint hooks
        run: ruff check hooks/ --select E,F,W --ignore E501

  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find hooks scripts -name '*.sh' -print0 | \
            xargs -0 shellcheck --severity=warning || true

  yaml-validate:
    name: YAML Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML configs
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, truthy: disable}}' \
            agents/ teams/
